name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build game packages
        run: npm run package:games

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FrequencyManager-Windows
          path: |
            dist/installer/*.exe
            dist/installer/latest.yml
            dist/installer/*.blockmap
            dist/game-packages/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/installer/*.exe
            dist/installer/latest.yml
            dist/installer/*.blockmap
            dist/game-packages/*.zip
          body: |
            ## FrequencyManager Release

            Download the `Setup` .exe below to run FrequencyManager on your Windows PC.

            **How to use:**
            1. Download the `Setup` .exe.
            2. Run it and follow the install wizard.
            3. The app checks for updates automatically after that.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs on the SAME tag push as the desktop build above, so a web deploy is
  # never one release behind — see docs/WEB_VERSION.md. Independent job (no
  # `needs:`) since the web build doesn't depend on anything the Windows job
  # produces; a plain static Vite build needs no Windows runner either.
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
