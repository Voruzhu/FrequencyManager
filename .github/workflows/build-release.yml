name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build game packages
        run: npm run package:games

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FrequencyManager-Windows
          path: |
            dist/installer/*.exe
            dist/installer/latest.yml
            dist/installer/*.blockmap
            dist/game-packages/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/installer/*.exe
            dist/installer/latest.yml
            dist/installer/*.blockmap
            dist/game-packages/*.zip
          body: |
            ## FrequencyManager Release

            Download the `Setup` .exe below to run FrequencyManager on your Windows PC.

            **How to use:**
            1. Download the `Setup` .exe.
            2. Run it and follow the install wizard.
            3. The app checks for updates automatically after that.
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
